<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waveform Synthesizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="synth-container">
        <div class="plugin-header">
            <div class="header-left">
                <div class="menu-icon">▼</div>
                <div class="plugin-title">Wavetable Synth</div>
            </div>
            <div class="window-controls">
                <span>_</span>
                <span>□</span>
                <span>×</span>
            </div>
        </div>

        <div class="upper-deck">
            <div class="visualizer-panel">
                <canvas id="oscilloscreen"></canvas>
            </div>

            <div class="control-rack">
                <div class="synth-module control-strip-panel">
                    <div class="module-header">SYNTH CONTROLS</div>
                    
                    <div class="control-group dropdown-group">
                        <label for="waveform">WAVE</label>
                        <select id="waveform">
                            <option value="sine">Sine</option>
                            <option value="square">Square</option>
                            <option value="sawtooth">Sawtooth</option>
                            <option value="triangle">Triangle</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="attack">ATT</label>
                        <div class="slider-wrapper">
                            <input type="range" id="attack" min="0" max="2" step="0.01" value="0.015">
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="release">REL</label>
                        <div class="slider-wrapper">
                            <input type="range" id="release" min="0.01" max="3" step="0.01" value="0.03">
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="cutoff">CUT</label>
                        <div class="slider-wrapper">
                            <input type="range" id="cutoff" min="20" max="20000" step="1" value="10000">
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="drive">DRV</label>
                        <div class="slider-wrapper">
                            <input type="range" id="drive" min="0" max="100" step="1" value="0">
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="pan">PAN</label>
                        <div class="slider-wrapper">
                            <input type="range" id="pan" min="-1" max="1" step="0.01" value="0">
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="volume">VOL</label>
                        <div class="slider-wrapper">
                            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="delay">DLY</label>
                        <div class="slider-wrapper">
                            <input type="range" id="delay" min="0" max="0.8" step="0.01" value="0">
                        </div>
                    </div>
                </div>

                <div class="expansion-stack">
                    <div class="horizontal-panel transport-deck-panel">
                        <div class="panel-header-tag">TRANSPORT SYSTEM</div>
                        <div class="transport-cluster">
                            <button id="playBtn" class="transport-btn">▶ PLAY</button>
                            <button id="stopBtn" class="transport-btn">■ STOP</button>
                            <button id="clearBtn" class="transport-btn">✕ CLEAR</button>
                            <button id="metroBtn" class="transport-btn">⚲ METRO</button>
                            
                            <div class="inline-control">
                                <label for="patternSelect">PAT</label>
                                <select id="patternSelect">
                                    <option value="1">Pattern 1</option>
                                    <option value="2">Pattern 2</option>
                                    <option value="3">Pattern 3</option>
                                    <option value="4">Pattern 4</option>
                                </select>
                            </div>

                            <div class="inline-control">
                                <label for="bpmInput">BPM</label>
                                <input type="number" id="bpmInput" min="60" max="240" value="120">
                            </div>

                            <div class="inline-control">
                                <label for="noteLengthSelect">LEN</label>
                                <select id="noteLengthSelect">
                                    <option value="1">16th Note</option>
                                    <option value="2">8th Note</option>
                                    <option value="4">Quarter Note</option>
                                    <option value="8">Half Note</option>
                                    <option value="16">Whole Note</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="horizontal-panel transport-deck-panel">
                        <div class="panel-header-tag">PROJECT UTILITY & DRUMS</div>
                        <div class="transport-cluster">
                            <button id="importBtn" class="transport-btn">📥 IMPORT</button>
                            <input type="file" id="importFile" style="display: none;" accept=".json">
                            <button id="exportBtn" class="transport-btn">📤 EXPORT</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="piano-roll-container">
            <div class="timeline-bar"></div>
            <div class="note-grid" id="noteGrid"></div>
        </div>

        <div class="keyboard" id="keyboard">
            <div class="key white" data-note="C3"></div>
            <div class="key black" data-note="C#3"></div>
            <div class="key white" data-note="D3"></div>
            <div class="key black" data-note="D#3"></div>
            <div class="key white" data-note="E3"></div>
            <div class="key white" data-note="F3"></div>
            <div class="key black" data-note="F#3"></div>
            <div class="key white" data-note="G3"></div>
            <div class="key black" data-note="G#3"></div>
            <div class="key white" data-note="A3"></div>
            <div class="key black" data-note="A#3"></div>
            <div class="key white" data-note="B3"></div>

            <div class="key white" data-note="C4"></div>
            <div class="key black" data-note="C#4"></div>
            <div class="key white" data-note="D4"></div>
            <div class="key black" data-note="D#4"></div>
            <div class="key white" data-note="E4"></div>
            <div class="key white" data-note="F4"></div>
            <div class="key black" data-note="F#4"></div>
            <div class="key white" data-note="G4"></div>
            <div class="key black" data-note="G#4"></div>
            <div class="key white" data-note="A4"></div>
            <div class="key black" data-note="A#4"></div>
            <div class="key white" data-note="B4"></div>

            <div class="key white" data-note="C5"></div>
            <div class="key black" data-note="C#5"></div>
            <div class="key white" data-note="D5"></div>
            <div class="key black" data-note="D#5"></div>
            <div class="key white" data-note="E5"></div>
            <div class="key white" data-note="F5"></div>
            <div class="key black" data-note="F#5"></div>
            <div class="key white" data-note="G5"></div>
            <div class="key black" data-note="G#5"></div>
            <div class="key white" data-note="A5"></div>
            <div class="key black" data-note="A#5"></div>
            <div class="key white" data-note="B5"></div>

            <div class="key white" data-note="C6"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
